<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Naturalize</title>
  <link rel="stylesheet" href="/css/entrar.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <img src="/fotos/logo_bg.png" alt="Logo Naturalize" class="logo">
      <h1>Naturalize</h1>
      <h2>Iniciar Sessão</h2>
      <form action="Logar" method="get" class="form-voluntario">
        <input type="text" id="txtusu" name="txtusu" placeholder="Usuário" required>
        <input type="password" id="txtsenha" name="txtsenha"  placeholder="Senha" required>
        <button type="submit"> <a href="/rotaprincipal" style="text-decoration: none; color: white;">Entrar</a> </button>
      </form>
    </div>
  </div>
</body>
</html>
